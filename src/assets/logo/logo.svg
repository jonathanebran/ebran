<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ebran logo</title>
  <desc id="desc">Abstract rounded letter E logo with a warm gold orange coral pink gradient for the Ebran app.</desc>
  <defs>
    <linearGradient id="ebranGradient" x1="184" y1="154" x2="850" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD84A"/>
      <stop offset="0.34" stop-color="#FF9F3D"/>
      <stop offset="0.66" stop-color="#FF6B5F"/>
      <stop offset="1" stop-color="#FF2F7D"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.45 0 0 0.42  0 0 0.2 0 0.18  0 0 0 0.85 0" result="warmGlow"/>
      <feMerge>
        <feMergeNode in="warmGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background by default. Place on #000000 for the official app look. -->
  <g filter="url(#softGlow)" stroke="url(#ebranGradient)" stroke-width="86" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left fluid spine -->
    <path d="M352 248 C286 296 252 384 254 512 C256 640 292 728 356 776"/>

    <!-- Top arm -->
    <path d="M365 252 C456 205 591 196 716 238 C758 252 775 280 755 305 C736 330 689 331 642 316 C557 290 470 298 398 338"/>

    <!-- Middle arm -->
    <path d="M323 512 C414 465 552 461 666 502 C707 517 724 545 704 570 C685 594 641 595 596 579 C515 550 435 557 356 600"/>

    <!-- Bottom arm -->
    <path d="M365 772 C456 819 591 828 716 786 C758 772 775 744 755 719 C736 694 689 693 642 708 C557 734 470 726 398 686"/>
  </g>

  <!-- Inner highlight for premium depth -->
  <g opacity="0.28" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M381 279 C461 241 582 235 688 270"/>
    <path d="M354 530 C435 494 548 494 640 527"/>
    <path d="M383 744 C462 783 582 789 688 754"/>
  </g>
</svg>
